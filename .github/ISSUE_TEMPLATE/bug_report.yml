name: Bug report / support request
description: Report a VRCForge problem with enough context for public beta triage.
title: "[Support]: "
labels: ["support", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for testing VRCForge. Please upload or paste the relevant support bundle artifact from Doctor when possible. VRCForge does not attach this automatically.

        Before uploading, review the bundle contents and remove anything you do not want to share publicly.
  - type: input
    id: version
    attributes:
      label: VRCForge version
      description: Example: 1.0.0 or the commit shown in About/Doctor.
      placeholder: 1.0.0
    validations:
      required: true
  - type: dropdown
    id: provider_mode
    attributes:
      label: Provider mode
      options:
        - BYOK cloud provider
        - Local provider / Ollama
        - Custom OpenAI-compatible endpoint
        - No-provider / manual read-only
        - Not sure
    validations:
      required: true
  - type: dropdown
    id: unity_connection
    attributes:
      label: Unity connection state
      options:
        - Connected and tools visible
        - Unity open but tools missing
        - Unity not open
        - Startup Doctor reports a blocker
        - Not sure
    validations:
      required: true
  - type: dropdown
    id: install_type
    attributes:
      label: Install type
      options:
        - Web installer
        - Offline installer
        - Portable zip
        - Source checkout
        - Not sure
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Startup / Doctor
        - Unity connection / MCP bridge
        - Provider / model setup
        - Avatar scan / validation
        - Checkpoint / rollback
        - Golden Path Matrix
        - Proof viewer / screenshots
        - Support bundle export
        - External agent connector
        - Skill package / .vsk
        - Installer / update / uninstall
        - Other
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: What happened?
      description: Describe the issue and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open VRCForge...
        2. Select project...
        3. Run...
    validations:
      required: true
  - type: textarea
    id: support_bundle
    attributes:
      label: Support bundle artifact
      description: Upload the Doctor support bundle zip/json, or paste the relevant redacted excerpt. Do not paste API keys, gateway tokens, paid asset contents, or private files.
      placeholder: Drag the support bundle artifact here, or paste a short redacted excerpt.
    validations:
      required: false
  - type: textarea
    id: evidence
    attributes:
      label: Extra evidence
      description: Screenshots, proof-viewer artifact paths, Golden Path Matrix report paths, Unity Console snippets, or installer logs.
    validations:
      required: false
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: I reviewed the uploaded/pasted support data and removed secrets, tokens, paid asset contents, and private files.
          required: true
