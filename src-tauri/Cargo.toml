[package]
name = "vrcforge-agentic-app"
version = "0.4.0-beta"
description = "VRCForge agentic desktop application"
authors = ["VRCForge"]
edition = "2021"

[build-dependencies]
tauri-build = { version = "2.2.0", features = [] }

[dependencies]
getrandom = "0.3"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tauri = { version = "2.2.0", features = ["tray-icon"] }
